<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">cursor-md-mindmaps</title>
  <desc id="desc">Symmetrical mindmap: central spine with two branches on the left and two on the right</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      /* Black outline then yellow fill — stroke widths tuned so arms meet spine (half yellow = 18px) */
      .ink { stroke: #0f0f0f; stroke-width: 44; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .fill { stroke: #ffeb3b; stroke-width: 36; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>
  <rect class="bg" width="512" height="512" rx="96"/>
  <g>
    <!-- Vertical spine: meets horizontal arms at x = 256 ± 18 -->
    <path class="ink" d="M256 178v156"/>
    <path class="ink" d="M92 214H238"/>
    <path class="ink" d="M274 214H420"/>
    <path class="ink" d="M92 298H238"/>
    <path class="ink" d="M274 298H420"/>
  </g>
  <g>
    <path class="fill" d="M256 178v156"/>
    <path class="fill" d="M92 214H238"/>
    <path class="fill" d="M274 214H420"/>
    <path class="fill" d="M92 298H238"/>
    <path class="fill" d="M274 298H420"/>
  </g>
</svg>
